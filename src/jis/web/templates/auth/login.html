{% extends "base.html" %}

{% block title %}JIS - Вход{% endblock %}

{% block pageTitle %}Вход в аккаунт{% endblock %}

{% block pageContent %}

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-card__header">
            <div class="login-card__icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h2 class="login-card__title">Добро пожаловать!</h2>
            <p class="login-card__subtitle">Войдите, чтобы продолжить</p>
        </div>
        
        <form method="POST" action="{{ url_for('post_login') }}" class="login-form">
            {% if error %}
            <div class="alert alert--danger">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="email_or_username" class="form-label">
                    <i class="fas fa-user"></i>
                    <span>Email или имя пользователя</span>
                </label>
                <input type="text" id="email_or_username" name="email_or_username" 
                       class="form-input" required autofocus
                       value="{{ request.query_params.get('email', '') }}"
                       placeholder="example@mail.com или username">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i>
                    <span>Пароль</span>
                </label>
                <input type="password" id="password" name="password" 
                       class="form-input" required
                       placeholder="••••••••">
            </div>
            
            <div class="form-group form-group--inline">
                <label class="checkbox">
                    <input type="checkbox" name="remember_me" class="checkbox__input">
                    <span class="checkbox__label">Запомнить меня</span>
                </label>
            </div>
            
            <button type="submit" class="btn btn--primary btn--block">
                <i class="fas fa-sign-in-alt"></i>
                Войти
            </button>
            
            <div class="login-links">
                <a href="{{ url_for('get_register') }}" class="login-link">
                    <i class="fas fa-user-plus"></i>
                    Создать аккаунт
                </a>
                <!-- <a href="#" class="login-link">
                    <i class="fas fa-key"></i>
                    Забыли пароль?
                </a> -->
            </div>
        </form>
    </div>
</div>

{% endblock %}
